version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agm_dev
    ports:
      - "5432:5432"
    volumes:
      - agm_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agm_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  db_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agm_test
    ports:
      - "5433:5432"
    volumes:
      - agm_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agm_test"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  agm_dev_data:
  agm_test_data:
