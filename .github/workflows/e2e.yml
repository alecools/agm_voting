              -H "x-vercel-protection-bypass: $VERCEL_BYPASS_TOKEN" \
              "$URL/api/health" || true
          done &
          echo "Keepalive started (PID $!)"
        env:
          VERCEL_BYPASS_TOKEN: ${{ secrets.VERCEL_BYPASS_TOKEN }}

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Link e2e_tests to frontend node_modules
        run: ln -sf ../frontend/node_modules e2e_tests/node_modules

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Warm up Lambda
        run: |
          URL="${{ github.event.deployment_status.environment_url }}"
          echo "Warming up Lambda at $URL"
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "x-vercel-protection-bypass: $VERCEL_BYPASS_TOKEN" \
