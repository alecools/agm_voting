  # ── 3. Merge reports ─────────────────────────────────────────────────────────
  merge-reports:
    name: Merge E2E Reports
    needs: [test-admin, test-public-voter, test-public-workflow, test-user-workflow]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: playwright-blob-*-${{ github.run_id }}
          path: frontend/all-blob-reports
          merge-multiple: true

      - name: Merge Playwright reports
        run: cd frontend && npx playwright merge-reports --reporter html all-blob-reports

      - name: Upload merged Playwright report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: frontend/playwright-report/
          retention-days: 7
