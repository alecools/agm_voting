name: E2E Tests (post-deploy)

# Triggered automatically by Vercel's GitHub integration when a preview
# deployment succeeds. Runs the full Playwright suite against the live URL.
# Production deployments are excluded — E2E only targets preview.
on:
  deployment_status:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Setup: seed data, save auth state ────────────────────────────────────
  setup:
    name: E2E Setup
    if: |
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment != 'Production'
    runs-on: ubuntu-latest

    outputs:
      branch_url: ${{ steps.branch-url.outputs.branch_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Link e2e_tests to frontend node_modules
        run: ln -sf ../frontend/node_modules e2e_tests/node_modules

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Derive stable branch alias URL
        id: branch-url
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Vercel sets deployment.ref to the commit SHA, not the branch name.
          # Use the GitHub API to find which branch this commit is the HEAD of.
          SHA="${{ github.event.deployment.sha }}"
          BRANCH=$(gh api "/repos/${{ github.repository }}/commits/${SHA}/branches-where-head" \
            --jq '.[0].name // empty' 2>/dev/null || echo "")
          if [ -z "$BRANCH" ]; then
            # Fallback: if .ref isn't a SHA it may be a branch name
            REF="${{ github.event.deployment.ref }}"
            if ! echo "$REF" | grep -qE '^[0-9a-f]{40}$'; then
              BRANCH="$REF"
            fi
          fi
          SLUG=$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/-\+/-/g' | sed 's/^-\|-$//g' | cut -c1-63)
          BRANCH_URL="https://internal-vms-git-${SLUG}-ocss.vercel.app"
          echo "branch_url=$BRANCH_URL" >> "$GITHUB_OUTPUT"
          echo "Branch: $BRANCH"
          echo "Branch alias URL: $BRANCH_URL"

      - name: Validate test URL
        run: |
          URL="${{ github.event.deployment_status.environment_url }}"
          if [ -z "$URL" ] || echo "$URL" | grep -qi "localhost"; then
            echo "ERROR: deployment URL is empty or localhost: '$URL'"
            exit 1
          fi
          echo "Deployment URL: $URL"
          echo "Branch alias URL: ${{ steps.branch-url.outputs.branch_url }}"

      - name: Seed data and save auth state
        run: cd frontend && npx playwright test --project=setup
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.branch-url.outputs.branch_url }}
          CI: 'true'
          VERCEL_BYPASS_TOKEN: ${{ secrets.VERCEL_BYPASS_TOKEN }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          GITHUB_HEAD_REF: ${{ github.event.deployment.ref }}

      - name: Verify auth files were created
        run: |
          echo "Checking for auth files..."
          ls -la e2e_tests/.auth/ || { echo "ERROR: e2e_tests/.auth/ not found"; exit 1; }
          test -f e2e_tests/.auth/admin.json || { echo "ERROR: admin.json missing"; exit 1; }
          test -f e2e_tests/.auth/public.json || { echo "ERROR: public.json missing"; exit 1; }
          test -f e2e_tests/.run-suffix || { echo "ERROR: .run-suffix missing"; exit 1; }
          echo "Auth files verified:"
          cat e2e_tests/.run-suffix

      - name: Upload auth state and run suffix
        uses: actions/upload-artifact@v4
        with:
          name: e2e-auth-state-${{ github.run_id }}
          path: |
            e2e_tests/.auth
            e2e_tests/.run-suffix
          include-hidden-files: true
          retention-days: 1

  # ── 2a. Admin tests ──────────────────────────────────────────────────────────
  test-admin:
    name: E2E Admin
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Link e2e_tests to frontend node_modules
        run: ln -sf ../frontend/node_modules e2e_tests/node_modules

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Warm up Lambda and start keepalive
        uses: ./.github/actions/warmup-lambda
        with:
          deployment-url: ${{ github.event.deployment_status.environment_url }}
          bypass-token: ${{ secrets.VERCEL_BYPASS_TOKEN }}

      - name: Download auth state
        uses: actions/download-artifact@v4
        with:
          name: e2e-auth-state-${{ github.run_id }}
          path: e2e_tests

      - name: Run Admin E2E tests
        run: cd frontend && npx playwright test --project=admin
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.setup.outputs.branch_url }}
          CI: 'true'
          VERCEL_BYPASS_TOKEN: ${{ secrets.VERCEL_BYPASS_TOKEN }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          GITHUB_HEAD_REF: ${{ github.event.deployment.ref }}

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-blob-admin-${{ github.run_id }}
          path: frontend/blob-report
          retention-days: 1

  # ── 2b. Public voter tests ───────────────────────────────────────────────────
  test-public-voter:
    name: E2E Public (Voter)
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Link e2e_tests to frontend node_modules
        run: ln -sf ../frontend/node_modules e2e_tests/node_modules

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Warm up Lambda and start keepalive
        uses: ./.github/actions/warmup-lambda
        with:
          deployment-url: ${{ github.event.deployment_status.environment_url }}
          bypass-token: ${{ secrets.VERCEL_BYPASS_TOKEN }}

      - name: Download auth state
        uses: actions/download-artifact@v4
        with:
          name: e2e-auth-state-${{ github.run_id }}
          path: e2e_tests

      - name: Run Public Voter E2E tests
        run: cd frontend && npx playwright test --project=public-voter
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.setup.outputs.branch_url }}
          CI: 'true'
          VERCEL_BYPASS_TOKEN: ${{ secrets.VERCEL_BYPASS_TOKEN }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          GITHUB_HEAD_REF: ${{ github.event.deployment.ref }}

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-blob-public-voter-${{ github.run_id }}
          path: frontend/blob-report
          retention-days: 1

  # ── 2c. Public workflow tests ────────────────────────────────────────────────
  test-public-workflow:
    name: E2E Public (Workflow)
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Link e2e_tests to frontend node_modules
        run: ln -sf ../frontend/node_modules e2e_tests/node_modules

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Warm up Lambda and start keepalive
        uses: ./.github/actions/warmup-lambda
        with:
          deployment-url: ${{ github.event.deployment_status.environment_url }}
          bypass-token: ${{ secrets.VERCEL_BYPASS_TOKEN }}

      - name: Download auth state
        uses: actions/download-artifact@v4
        with:
          name: e2e-auth-state-${{ github.run_id }}
          path: e2e_tests

      - name: Run Public Workflow E2E tests
        run: cd frontend && npx playwright test --project=public-workflow
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.setup.outputs.branch_url }}
          CI: 'true'
          VERCEL_BYPASS_TOKEN: ${{ secrets.VERCEL_BYPASS_TOKEN }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          GITHUB_HEAD_REF: ${{ github.event.deployment.ref }}

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-blob-public-workflow-${{ github.run_id }}
          path: frontend/blob-report
          retention-days: 1

  # ── 2d. User workflow tests ─────────────────────────────────────────────────
  test-user-workflow:
    name: E2E User Workflow
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Link e2e_tests to frontend node_modules
        run: ln -sf ../frontend/node_modules e2e_tests/node_modules

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Warm up Lambda and start keepalive
        uses: ./.github/actions/warmup-lambda
        with:
          deployment-url: ${{ github.event.deployment_status.environment_url }}
          bypass-token: ${{ secrets.VERCEL_BYPASS_TOKEN }}

      - name: Download auth state
        uses: actions/download-artifact@v4
        with:
          name: e2e-auth-state-${{ github.run_id }}
          path: e2e_tests

      - name: Run User Workflow E2E tests
        run: cd frontend && npx playwright test --project=user-workflow
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.setup.outputs.branch_url }}
          CI: 'true'
          VERCEL_BYPASS_TOKEN: ${{ secrets.VERCEL_BYPASS_TOKEN }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          GITHUB_HEAD_REF: ${{ github.event.deployment.ref }}

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-blob-user-workflow-${{ github.run_id }}
          path: frontend/blob-report
          retention-days: 1

  # ── 3. Merge reports ─────────────────────────────────────────────────────────
  merge-reports:
    name: Merge E2E Reports
    needs: [setup, test-admin, test-public-voter, test-public-workflow, test-user-workflow]
    if: always() && needs.setup.result != 'skipped'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: playwright-blob-*-${{ github.run_id }}
          path: frontend/all-blob-reports
          merge-multiple: true

      - name: Merge Playwright reports
        run: cd frontend && npx playwright merge-reports --reporter html all-blob-reports

      - name: Upload merged Playwright report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: frontend/playwright-report/
          retention-days: 7
