name: CI

on:
  push:
    branches: [demo]      # post-merge CI only
  pull_request:
    branches: [demo, master]  # CI on PRs targeting demo or master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect changed files
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.semgrep/**'
            frontend:
              - 'frontend/**'
              - '.semgrep/**'

  backend:
    name: Backend tests + security scan
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'push'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Cache uv virtualenv
        uses: actions/cache@v4
        with:
          path: |
            backend/.venv
            ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('backend/pyproject.toml', 'backend/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: cd backend && uv sync --extra dev

      - name: Run migrations on test DB
        run: |
          cd backend
          uv run alembic -x dburl=postgresql+asyncpg://postgres:postgres@localhost:5432/agm_test upgrade head
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/agm_test
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/agm_test

      - name: Backend tests (100% coverage)
        run: |
          cd backend
          uv run pytest tests/ -n auto --cov=app --cov-report=term-missing --cov-fail-under=100 -q
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/agm_test
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/agm_test

      - name: Security scan (bandit)
        run: |
          cd backend
          uv run bandit -r app/ -c pyproject.toml -ll

  frontend:
    name: Frontend tests + security lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Frontend tests (100% coverage)
        run: cd frontend && npm run test:coverage

      - name: Security lint (eslint-plugin-security)
        run: cd frontend && npm run lint:security

  semgrep:
    name: Security scan (semgrep)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-semgrep-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-semgrep-
      - name: Install semgrep
        run: pip install semgrep
      - name: Semgrep scan
        run: |
          semgrep --config .semgrep/rules.yml backend/app/ --error
          semgrep --config .semgrep/rules.yml frontend/src/ --error
