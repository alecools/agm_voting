name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [preview, master]

jobs:
  backend:
    name: Backend tests + security scan
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: cd backend && uv sync --extra dev

      - name: Run migrations on test DB
        run: |
          cd backend
          uv run alembic -x dburl=postgresql+asyncpg://postgres:postgres@localhost:5432/agm_test upgrade head
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/agm_test
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/agm_test

      - name: Backend tests (100% coverage)
        run: |
          cd backend
          uv run pytest tests/ -n auto --cov=app --cov-report=term-missing --cov-fail-under=100 -q
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/agm_test
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/agm_test

      - name: Security scan (bandit)
        run: |
          cd backend
          uv run bandit -r app/ -c pyproject.toml -ll

      - name: Install semgrep
        run: pip install semgrep

      - name: Security scan (semgrep — backend rules)
        run: semgrep --config .semgrep/rules.yml backend/app/ --error

  frontend:
    name: Frontend tests + security lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Frontend tests (100% coverage)
        run: cd frontend && npm run test:coverage

      - name: Security lint (eslint-plugin-security)
        run: cd frontend && npm run lint:security

      - name: Set up Python (for semgrep)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install semgrep
        run: pip install semgrep

      - name: Security scan (semgrep — frontend rules)
        run: semgrep --config .semgrep/rules.yml frontend/src/ --error
