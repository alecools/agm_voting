name: DAST Security Scan

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday at 3am UTC
  workflow_dispatch:

jobs:
  zap-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'https://vms-demo.ocss.tech'
          rules_file_name: '.github/zap-rules.tsv'
          fail_action: true
        env:
          ZAP_AUTH_HEADER_VALUE: ${{ secrets.VERCEL_BYPASS_TOKEN }}
          ZAP_AUTH_HEADER: x-vercel-protection-bypass

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report-${{ github.run_id }}
          path: report_html.html

      - name: Open issue on findings
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `DAST scan found security issues (${new Date().toISOString().slice(0,10)})`,
              body: 'ZAP baseline scan detected issues. See workflow artifacts for the full report.',
              labels: ['security']
            })
